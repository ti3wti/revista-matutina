<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Inicio - Revista Matutina</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor del ícono y las ondas */
        .icon-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fa-satellite-dish {
            font-size: 6rem;
            color: #58a6ff;
            z-index: 2;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
        }

        /* Animación de ondas de radio emisoras */
        .wave {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 4px solid #58a6ff;
            border-radius: 50%;
            z-index: 1;
            opacity: 0;
            animation: wave-animation 3s infinite ease-out;
        }

        .wave:nth-child(2) {
            animation-delay: 1s;
        }

        .wave:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes wave-animation {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        /* Estilos de texto */
        h1 {
            font-size: 4.5rem;
            color: #ffab70;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse-text 2.5s infinite ease-in-out;
        }

        h2 {
            font-size: 2.5rem;
            color: #c9d1d9;
            margin: 0;
            font-weight: normal;
        }

        /* Animación de los puntos suspensivos */
        .dots span {
            animation: blink 1.5s infinite both;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; text-shadow: 0 0 15px rgba(255, 171, 112, 0.4); }
            50% { opacity: 0.8; text-shadow: 0 0 30px rgba(255, 171, 112, 0.8); }
        }

        @keyframes blink {
            0%, 20% { opacity: 0; }
            50%, 100% { opacity: 1; }
        }
        
        /* Decoración inferior */
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 1.5rem;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <i class="fa-solid fa-satellite-dish"></i>
        </div>
        
        <h1>En un momento iniciamos<span class="dots"><span>.</span><span>.</span><span>.</span></span></h1>
        <h2>Revista Matutina Tango India</h2>
    </div>

    <div class="footer">
        <img src="https://flagcdn.com/48x36/cr.png" alt="CR" style="border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5);"> 
        Transmisión en Vivo
    </div>
</body>
</html>
